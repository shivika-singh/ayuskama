<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ayuskama - Therapists</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4CAF50;
            --primary-light: #81C784;
            --primary-dark: #388E3C;
            --accent: #C5A059;
            --bg-color: #fdfdfd;
            --card-bg: rgba(255, 255, 255, 0.85);
            --text-main: #1a1a1a;
            --text-muted: #666666;
            --border: #e8e8e8;
            --hover-bg: #f4f6f4;
        }
        h1, h2, h3, h4, h5, h6, .brand-logo, .option-title, .section-title {
            font-family: 'Cormorant Garamond', serif !important;
        }
        body, p, span, a, div, button, input {
            font-family: 'Montserrat', sans-serif;
        }


        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Top Navigation Bar */
        .navbar {
            background: white;
            padding: 1rem 3rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 15px rgba(43, 89, 63, 0.05);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .brand-logo {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--primary-dark);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            letter-spacing: -0.5px;
        }

        .brand-logo span {
            color: var(--accent);
        }

        .nav-links {
            display: flex;
            gap: 1.5rem;
            align-items: center;
        }

        .nav-btn {
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 500;
            font-size: 1rem;
            transition: all 0.2s ease;
        }

        .nav-btn-outline {
            color: var(--primary);
            border: 1px solid var(--primary);
            background: transparent;
        }

        .nav-btn-outline:hover {
            background: var(--hover-bg);
        }

        .nav-btn-solid {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 10px rgba(43, 89, 63, 0.2);
        }

        .nav-btn-solid:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
        }

        /* Main Content Grid */
        .main-container {
            padding: 3rem;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
            flex: 1;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 2rem;
        }

        .page-title h1 {
            font-size: 2.2rem;
            color: var(--primary-dark);
            margin-bottom: 0.5rem;
        }

        .page-title p {
            color: var(--text-muted);
            font-size: 1.05rem;
        }

        /* Therapists Grid Section */
        .therapist-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
        }

        .therapist-card {
            background: var(--card-bg);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(43, 89, 63, 0.05);
            border: 1px solid var(--border);
            overflow: hidden;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
            text-align: center;
        }

        .therapist-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(43, 89, 63, 0.08);
        }

        .therapist-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: var(--primary-light);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 2.5rem;
            margin-bottom: 1.5rem;
        }

        .therapist-name {
            font-size: 1.5rem;
            color: var(--primary-dark);
            margin-bottom: 0.5rem;
        }

        .therapy-name {
            display: inline-block;
            background: #e3f0e8;
            color: var(--primary);
            padding: 6px 15px;
            border-radius: 20px;
            font-weight: 500;
            font-size: 0.95rem;
            margin-bottom: 1.5rem;
        }

        .contact-info {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-muted);
            font-size: 1.05rem;
            margin-top: auto; /* pushes it to the bottom */
        }

        .contact-icon {
            color: var(--accent);
            font-size: 1.1rem;
        }

        @media (max-width: 900px) {
            .navbar {
                flex-direction: column;
                gap: 1rem;
                padding: 1rem;
            }
            .page-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 1rem;
            }
            .main-container {
                padding: 1.5rem;
            }
            .therapist-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
    <link rel="stylesheet" href="animations.css">
    <link rel="stylesheet" href="ayuskama-theme.css">
</head>
<body>

<!-- Navigation Bar -->
<div class="navbar">
    <a href="dashboard.html" class="brand-logo">
        <img src="assets/logo.jpg" alt="Logo" style="width: 30px; height: 30px; border-radius: 50%; object-fit: cover; vertical-align: middle;"> Ayuskama <small style="font-size: 0.9rem; color: #6b8273; font-weight: 400; margin-left: 10px;">Admin</small>
    </a>
    <div class="nav-links">
        <a href="treatments.html" class="nav-btn nav-btn-outline">Treatments</a>
        <a href="register.html" class="nav-btn nav-btn-outline">New Patient</a>
        <a href="therapist.html" class="nav-btn nav-btn-outline">Therapists</a>
        <a href="dashboard.html" class="nav-btn nav-btn-outline">Dashboard</a>
        <a href="login.html" class="nav-btn nav-btn-solid">Logout</a>
    </div>
</div>

<div class="main-container">
    <div class="page-header">
        <div class="page-title">
            <h1>Our Therapists</h1>
            <p>Manage and view your active therapists.</p>
        </div>
    </div>

    <!-- Therapists Grid -->
    <div class="therapist-grid" id="therapistGrid">
        <!-- Dynamic Content populated by JS -->
    </div>
</div>

<script>
    const gridContainer = document.getElementById("therapistGrid");

    function getInitials(name) {
        // Remove 'Dr. ' prefix for initials if present
        const cleanName = name.replace(/^Dr\.\s*/i, '');
        return cleanName.split(' ').map(n => n[0]).join('').substring(0, 2).toUpperCase();
    }

    function renderTherapists(therapists) {
        gridContainer.innerHTML = "";

        if (therapists.length === 0) {
            gridContainer.innerHTML = "<p>No therapists found.</p>";
            return;
        }

        therapists.forEach(therapist => {
            const cardLink = document.createElement("a");
            cardLink.href = `therapist-details.html?id=${therapist.id}`;
            cardLink.style.textDecoration = 'none';
            cardLink.style.color = 'inherit';

            const card = document.createElement("div");
            card.className = "therapist-card";
            card.innerHTML = `
                <div class="therapist-avatar">${getInitials(therapist.name)}</div>
                <h3 class="therapist-name">${therapist.name}</h3>
                <div class="therapy-name">${therapist.therapy}</div>
                <div class="contact-info">
                    <span class="contact-icon">📞</span>
                    <span>${therapist.phone}</span>
                </div>
            `;
            
            cardLink.appendChild(card);
            gridContainer.appendChild(cardLink);
        });
    }

    async function fetchTherapists() {
        try {
            const response = await fetch("http://localhost:5001/api/therapists");
            if (!response.ok) throw new Error("Network error");
            const data = await response.json();
            renderTherapists(data);
        } catch (error) {
            console.error("Failed to fetch therapists:", error);
            gridContainer.innerHTML = "<p>Error loading therapists. Is backend running?</p>";
        }
    }

    // Initial fetch
    fetchTherapists();

</script>

    <script src="animations.js"></script>
</body>
</html>
