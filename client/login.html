<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ayuskama - Admin Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4CAF50;
            --primary-light: #81C784;
            --primary-dark: #388E3C;
            --accent: #C5A059;
            --bg-color: #fdfdfd;
            --card-bg: rgba(255, 255, 255, 0.85);
            --text-main: #1a1a1a;
            --text-muted: #666666;
            --border: #e8e8e8;
            --hover-bg: #f4f6f4;
        }
        h1, h2, h3, h4, h5, h6, .brand-logo, .option-title, .section-title {
            font-family: 'Cormorant Garamond', serif !important;
        }
        body, p, span, a, div, button, input {
            font-family: 'Montserrat', sans-serif;
        }


        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            background-image: radial-gradient(circle at 100% 0%, #e3f0e8 0%, transparent 50%),
                              radial-gradient(circle at 0% 100%, #e3f0e8 0%, transparent 50%);
        }

        .login-container {
            width: 100%;
            max-width: 480px;
            background: var(--card-bg);
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(43, 89, 63, 0.08);
            overflow: hidden;
            position: relative;
            padding: 3.5rem;
        }

        .login-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 6px;
            background: linear-gradient(90deg, var(--primary) 0%, var(--accent) 100%);
        }

        .brand-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .brand-header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--primary-dark);
            margin-bottom: 0.5rem;
            letter-spacing: -0.5px;
        }

        .brand-header h1 span {
            color: var(--accent);
        }

        .brand-header p {
            color: var(--text-muted);
            font-size: 1.05rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-size: 0.95rem;
            font-weight: 500;
            color: var(--text-main);
        }

        input {
            width: 100%;
            padding: 14px 18px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: #fafcfa;
            font-size: 1.05rem;
            color: var(--text-main);
            transition: all 0.3s ease;
        }

        input:hover {
            border-color: #c8d9ce;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            background: #ffffff;
            box-shadow: 0 0 0 4px rgba(43, 89, 63, 0.1);
        }

        .submit-btn {
            width: 100%;
            margin-top: 1rem;
            padding: 16px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.15rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .submit-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: all 0.5s ease;
        }

        .submit-btn:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(43, 89, 63, 0.2);
        }

        .submit-btn:hover::before {
            left: 100%;
        }

        .alert-error {
            display: none;
            padding: 14px 16px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-weight: 500;
            animation: slideDown 0.4s ease;
            font-size: 0.95rem;
            align-items: center;
            gap: 10px;
            background: var(--error-bg);
            color: var(--error);
            border: 1px solid #f5c6cb;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 480px) {
            .login-container {
                padding: 2.5rem 2rem;
            }
        }
    </style>
    <link rel="stylesheet" href="animations.css">
    <link rel="stylesheet" href="ayuskama-theme.css">
</head>
<body>

<div class="login-container">
    <div class="brand-header">
        <h1 style="display: flex; align-items: center; gap: 12px; justify-content: inherit;"><img src="assets/logo.jpg" alt="Logo" style="width: 45px; height: 45px; border-radius: 50%; object-fit: cover; box-shadow: 0 4px 10px rgba(0,0,0,0.1);"> Ayuskama</h1>
        <p>Admin Portal Login</p>
    </div>

    <div id="errorMsg" class="alert-error">
        <span>❌</span> Invalid username or password.
    </div>

    <form id="loginForm">
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" placeholder="Enter your username" required autocomplete="username">
        </div>

        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Enter your password" required autocomplete="current-password">
        </div>

        <button type="submit" class="submit-btn" id="loginBtn">
            Sign In <span>→</span>
        </button>
    </form>
    
    <div style="margin-top: 1.5rem; text-align: center; font-size: 0.95rem;">
        <span style="color: var(--text-muted);">Are you a therapist?</span>
        <a href="therapist-login.html" style="color: var(--primary-dark); font-weight: 600; text-decoration: none; margin-left: 5px; transition: color 0.2s;">Therapist Login</a>
    </div>
    
    <div style="margin-top: 1rem; text-align: center;">
        <a href="#" onclick="openResetModal(event)" style="color: var(--text-muted); font-size: 0.85rem; text-decoration: none; transition: color 0.2s;">Forgot Password?</a>
    </div>
</div>

<!-- Forgot Password Modal -->
<div id="resetModal" class="modal-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.4); justify-content: center; align-items: center; z-index: 1000; backdrop-filter: blur(4px);">
    <div class="login-container" style="max-width: 420px; padding: 2.5rem; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.15); background: white; position: relative;">
        <button onclick="closeResetModal()" style="position: absolute; top: 15px; right: 15px; background: none; border: none; font-size: 1.5rem; cursor: pointer; color: var(--text-muted);">&times;</button>
        <div class="brand-header" style="margin-bottom: 1.5rem;">
            <h2 style="font-size: 1.8rem; color: var(--primary-dark); font-weight: 600;">Reset Password</h2>
            <p style="font-size: 0.9rem; color: var(--text-muted); margin-top: 5px;">Enter your username to set a new password</p>
        </div>
        <div id="resetErrorMsg" class="alert-error" style="margin-bottom: 15px; display: none;"></div>
        <div id="resetSuccessMsg" style="display: none; padding: 12px; background: #e8f5e9; border: 1px solid #c8e6c9; color: #2e7d32; border-radius: 8px; margin-bottom: 15px; font-size: 0.9rem; font-weight: 500;"></div>
        <form id="resetForm">
            <div class="form-group" style="margin-bottom: 1rem;">
                <label for="resetUsername">Username</label>
                <input type="text" id="resetUsername" placeholder="Enter admin username" required>
            </div>
            <div class="form-group" style="margin-bottom: 1.5rem;">
                <label for="resetNewPassword">New Password</label>
                <input type="password" id="resetNewPassword" placeholder="Enter new password" required>
            </div>
            <button type="submit" class="submit-btn" id="resetBtn" style="margin-top: 0; padding: 12px;">Reset Password</button>
        </form>
    </div>
</div>

<script>
    // Redirect if already logged in
    if (localStorage.getItem('adminLoggedIn')) {
        window.location.replace("dashboard.html");
    }

    const form = document.getElementById("loginForm");
    const errorMsg = document.getElementById("errorMsg");
    const loginBtn = document.getElementById("loginBtn");
    
    form.addEventListener("submit", async function(e) {
        e.preventDefault();
        
        // Hide previous errors
        errorMsg.style.display = "none";
        
        // Add loading state
        const originalText = loginBtn.innerHTML;
        loginBtn.innerHTML = "Authenticating... <span>⏳</span>";
        loginBtn.style.opacity = "0.8";
        loginBtn.disabled = true;
 
        const username = document.getElementById("username").value.trim();
        const password = document.getElementById("password").value;
 
        try {
            const response = await fetch('http://localhost:5001/api/admin/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ username, password })
            });
 
            const data = await response.json();
 
            if (response.ok) {
                // Success - redirect to dashboard
                localStorage.setItem('adminLoggedIn', 'true');
                window.location.replace("dashboard.html");
            } else {
                showError(data.message || "Invalid username or password.");
            }
        } catch (err) {
            console.error(err);
            showError("Unable to connect to server. Please try again.");
        } finally {
            // Restore button
            loginBtn.innerHTML = originalText;
            loginBtn.style.opacity = "1";
            loginBtn.disabled = false;
        }
    });

    function showError(msg) {
        errorMsg.innerHTML = `<span>❌</span> ${msg}`;
        errorMsg.style.display = "flex";
        
        // Shake effect on the container
        const container = document.querySelector('.login-container');
        container.style.transform = "translateX(5px)";
        setTimeout(() => container.style.transform = "translateX(-5px)", 100);
        setTimeout(() => container.style.transform = "translateX(5px)", 200);
        setTimeout(() => container.style.transform = "translateX(0)", 300);
        
        // Clear password field on fail
        document.getElementById("password").value = "";
        document.getElementById("password").focus();
    }

    // Modal controls for Forgot Password
    function openResetModal(e) {
        e.preventDefault();
        document.getElementById("resetModal").style.display = "flex";
        document.getElementById("resetUsername").value = "";
        document.getElementById("resetNewPassword").value = "";
        document.getElementById("resetErrorMsg").style.display = "none";
        document.getElementById("resetSuccessMsg").style.display = "none";
    }

    function closeResetModal() {
        document.getElementById("resetModal").style.display = "none";
    }

    const resetForm = document.getElementById("resetForm");
    const resetErrorMsg = document.getElementById("resetErrorMsg");
    const resetSuccessMsg = document.getElementById("resetSuccessMsg");
    const resetBtn = document.getElementById("resetBtn");

    resetForm.addEventListener("submit", async function(e) {
        e.preventDefault();
        resetErrorMsg.style.display = "none";
        resetSuccessMsg.style.display = "none";

        const username = document.getElementById("resetUsername").value.trim();
        const newPassword = document.getElementById("resetNewPassword").value;

        const originalText = resetBtn.innerHTML;
        resetBtn.innerHTML = "Processing... <span>⏳</span>";
        resetBtn.disabled = true;

        try {
            const res = await fetch('http://localhost:5001/api/admin/reset-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, newPassword })
            });
            const data = await res.json();
            if (res.ok) {
                resetSuccessMsg.innerHTML = "Password reset successfully. You can now log in!";
                resetSuccessMsg.style.display = "block";
                setTimeout(() => {
                    closeResetModal();
                }, 2000);
            } else {
                resetErrorMsg.innerHTML = `<span>❌</span> ${data.message || "Failed to reset password."}`;
                resetErrorMsg.style.display = "flex";
            }
        } catch (err) {
            console.error(err);
            resetErrorMsg.innerHTML = `<span>❌</span> Unable to connect to server.`;
            resetErrorMsg.style.display = "flex";
        } finally {
            resetBtn.innerHTML = originalText;
            resetBtn.disabled = false;
        }
    });
</script>

    <script src="animations.js"></script>
</body>
</html>
